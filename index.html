<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To do list</title>
  <link rel="icon" href="images/webIcon.png" >
  <meta property="og:image" content="images/share.png" >

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/section.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/tasks.css">

  <script defer src="script.js"></script>
</head>

<body class="body">
  <div class="container">
    <header class="header">Lista zadań</header>
    <main>
      <section class="section">
        <h1 class="section__header">Dodaj nowe zadanie</h1>
        <form class="form js-form">
          <input type="text" class="form__taskInput js-taskInput" placeholder="Co jest do zrobienia?" autofocus required>
          <button class="form__button">Dodaj zadanie</button>
        </form>
      </section>
      <section class="section">
        <h1 class="section__header">Lista zadań</h1>
        <ul class="tasksList js-tasksList"></ul>
      </section>
    </main>
  </div>
</body>

</html>
